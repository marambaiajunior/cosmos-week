name: Atualizar notícias

on:
  schedule:
    - cron: '0 1,13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar script de atualização
        run: python scripts/fetch_news.py

      - name: Commitar mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json posts.js
          git diff --cached --quiet || git commit -m "Atualização automática das notícias"
          git push
