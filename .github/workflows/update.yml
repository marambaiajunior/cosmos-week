name: Atualizar notícias

on:
  schedule:
    # Fase 1: atualiza 3× por dia — manhã, tarde e noite (UTC)
    # Horários em Utah (MT):
    #   06:00 UTC = 23:00 MST / 00:00 MDT (madrugada)
    #   13:00 UTC = 06:00 MST / 07:00 MDT (manhã)
    #   20:00 UTC = 13:00 MST / 14:00 MDT (tarde)
    - cron: '0 6 * * *'
    - cron: '0 13 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cosmos-week-feed
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      COSMOS_SITE_URL: 'https://www.cosmosweek.com/'
      GEMINI_BATCH_SIZE: '1'
      GEMINI_RPM_LIMIT: '3'
      GEMINI_RETRY_ON_429: '1'
      GEMINI_RETRY_TRANSIENT: '1'
      GEMINI_RETRY_BASE_DELAY: '25'
      GEMINI_RETRY_DELAY_429: '75'
      GEMINI_PROBE_ENABLED: '1'
      GEMINI_PROBE_RETRIES: '1'
      GEMINI_DISABLE_AFTER_CONSECUTIVE_503: '2'
      GEMINI_MODEL_FALLBACKS: 'gemini-2.0-flash,gemini-2.0-flash-lite,gemini-1.5-flash'
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Mostrar versão do Python
        run: python --version

      - name: Verificar chave Gemini
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "::warning::GEMINI_API_KEY não configurada. A revisão do português será pulada."
            echo "Para ativar: Settings > Secrets and variables > Actions > New repository secret"
            echo "Nome: GEMINI_API_KEY  |  Valor: sua chave do Google AI Studio"
          else
            echo "✓ GEMINI_API_KEY presente (${#GEMINI_API_KEY} caracteres)"
          fi

      - name: Validar sintaxe do script
        run: python -m py_compile scripts/fetch_news.py

      - name: Gerar portal e metadados estáticos
        run: python scripts/fetch_news.py

      - name: Aplicar curadoria editorial do Cosmos Week
        run: python scripts/editorial_refine.py

      - name: Validar arquivos gerados
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              Path('posts.json'),
              Path('posts.js'),
              Path('all_posts.json'),
              Path('feed.xml'),
              Path('sitemap.xml'),
              Path('robots.txt'),
              Path('noticia'),
              Path('en/news'),
          ]

          missing = [str(p) for p in required if not p.exists()]
          if missing:
              raise SystemExit(f'Arquivos ausentes: {missing}')

          json.loads(Path('posts.json').read_text(encoding='utf-8'))
          json.loads(Path('all_posts.json').read_text(encoding='utf-8'))
          print('✓ Arquivos gerados com sucesso e JSON válido')
          PY

      - name: Mostrar alterações geradas
        shell: bash
        run: |
          set -euo pipefail
          find . -type d -name '__pycache__' -prune -exec rm -rf {} +
          git status --short

      - name: Commitar mudanças
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A posts.json posts.js all_posts.json feed.xml sitemap.xml robots.txt noticia/ en/
          if git diff --cached --quiet; then
            echo "Nenhuma alteração nas notícias."
          else
            git commit -m "Atualização automática das notícias [skip ci]"
            git push
          fi
