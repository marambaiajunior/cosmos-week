name: Atualizar notícias

on:
  schedule:
    - cron: '0 1,13 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cosmos-week-feed
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      PYTHONUNBUFFERED: '1'
      COSMOS_SITE_URL: 'https://marambaiajunior.github.io/cosmos-week/'
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Gerar portal e metadados estáticos
        run: python scripts/fetch_news.py

      - name: Commitar mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json posts.js feed.xml sitemap.xml robots.txt index.html scripts/fetch_news.py .github/workflows/update.yml
          if git diff --cached --quiet; then
            echo "Nenhuma alteração nas notícias."
          else
            git commit -m "Atualização automática das notícias"
            git push
          fi
