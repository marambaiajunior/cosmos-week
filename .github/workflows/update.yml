name: Atualizar notícias

on:
  schedule:
    # Executa 1× por dia às 10:00 UTC.
    # Em Utah isso corresponde a:
    # Em Utah isso corresponde aproximadamente a:
    # - 03:00 durante MST (horário padrão)
    # - 04:00 durante MDT (horário de verão)
    # Assim, a execução acontece na madrugada local, fora do pico de uso.
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cosmos-week-feed
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    # Tempo máximo total do job: 40 minutos.
    # Sem Gemini a pipeline termina em ~3 min.
    # Com Gemini e retries em dias de alta demanda, pode se aproximar desse limite.
    timeout-minutes: 40

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      PYTHONUNBUFFERED: '1'
      COSMOS_SITE_URL: 'https://www.cosmosweek.com/'
      GEMINI_BATCH_SIZE: '2'
      GEMINI_DISABLE_AFTER_CONSECUTIVE_503: '3'
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # ── Diagnóstico da chave Gemini ──────────────────────────────────────
      # Este passo não falha o workflow, apenas avisa no log se a chave
      # estiver ausente para facilitar o diagnóstico.
      - name: Verificar chave Gemini
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning::GEMINI_API_KEY não configurada. A revisão do português será pulada."
            echo "Para ativar: Settings → Secrets and variables → Actions → New repository secret"
            echo "Nome: GEMINI_API_KEY  |  Valor: sua chave do Google AI Studio (aistudio.google.com)"
          else
            echo "✓ GEMINI_API_KEY presente (${#GEMINI_API_KEY} caracteres)"
          fi

      - name: Gerar portal e metadados estáticos
        run: python scripts/fetch_news.py

      # ── Commit apenas dos arquivos gerados pelo script ───────────────────
      # Não incluir index.html, scripts/fetch_news.py nem o próprio workflow,
      # pois esses não são modificados pelo script e adicionar arquivos não
      # alterados ao commit gera confusão no histórico do repositório.
      - name: Commitar mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json posts.js all_posts.json feed.xml sitemap.xml robots.txt noticia
          if git diff --cached --quiet; then
            echo "Nenhuma alteração nas notícias."
          else
            git commit -m "Atualização automática das notícias [skip ci]"
            git push
          fi
